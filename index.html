<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>bagelarcade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0b0714;        /* near-black room */
    --ink-2: #150e24;      /* raised panel */
    --dough: #f2c14e;      /* toasted bagel gold */
    --crust: #c98a2d;      /* darker crust gold */
    --cream: #fdf6e3;      /* cream cheese */
    --nose: #ff6ea9;       /* neon pink */
    --fur: #17141c;        /* black cat fur */
    --screen: #79f2c3;     /* CRT phosphor mint */
    --shadow: rgba(0,0,0,.35);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--cream);
    font-family: "Nunito", sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 64px;
  }

  /* ============ LOGO: cat-eared arcade cabinet ============ */
  .logo {
    position: relative;
    width: 180px;
    margin-bottom: 8px;
    filter: drop-shadow(0 0 22px rgba(242,193,78,.22));
  }

  /* Ears sit on top of the cabinet */
  .ears {
    display: flex;
    justify-content: space-between;
    padding: 0 14px;
  }
  .ear {
    width: 0; height: 0;
    border-left: 30px solid transparent;
    border-right: 30px solid transparent;
    border-bottom: 44px solid var(--fur);
    position: relative;
    filter: drop-shadow(0 0 3px rgba(255,110,169,.55));
  }
  .ear::after {                 /* inner ear */
    content: "";
    position: absolute;
    left: -16px; top: 14px;
    width: 0; height: 0;
    border-left: 16px solid transparent;
    border-right: 16px solid transparent;
    border-bottom: 26px solid var(--nose);
  }

  /* Cabinet body */
  .cabinet {
    background: var(--dough);
    border-radius: 6px 6px 3px 3px;
    padding: 14px 14px 16px;
    border: 4px solid var(--crust);
  }

  .marquee {
    background: var(--ink);
    color: var(--dough);
    font-family: "Press Start 2P", monospace;
    font-size: 9px;
    text-align: center;
    letter-spacing: 1px;
    padding: 8px 4px;
    border-radius: 2px;
    margin-bottom: 10px;
  }

  .screen {
    background: radial-gradient(ellipse at 50% 40%, var(--screen) 0%, #3aa87f 100%);
    border-radius: 3px;
    height: 96px;
    display: grid;
    place-items: center;
    position: relative;
    overflow: hidden;
    border: 3px solid var(--crust);
    box-shadow: 0 0 18px rgba(121,242,195,.35);
  }
  .screen::after {              /* CRT scanlines */
    content: "";
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,.12) 3px 4px);
    pointer-events: none;
  }

  /* Black cat face on screen */
  .face {
    position: relative;
    width: 70px; height: 48px;
    background: var(--fur);
    border-radius: 46% 46% 50% 50%;
  }
  .face::before, .face::after {   /* little head ears */
    content: "";
    position: absolute; top: -10px;
    width: 0; height: 0;
    border-left: 11px solid transparent;
    border-right: 11px solid transparent;
    border-bottom: 16px solid var(--fur);
  }
  .face::before { left: 4px; transform: rotate(-12deg); }
  .face::after  { right: 4px; transform: rotate(12deg); }
  .eye {
    position: absolute; top: 14px;
    width: 12px; height: 14px;
    background: #9bf05a;
    box-shadow: 0 0 6px rgba(155,240,90,.8);
    border-radius: 50% 50% 45% 45%;
    animation: blink 4s infinite;
    z-index: 1;
  }
  .eye.l { left: 12px; }  .eye.r { right: 12px; }
  .snoot {
    position: absolute; left: 50%; top: 30px;
    transform: translateX(-50%);
    width: 10px; height: 8px;
    background: var(--nose);
    border-radius: 40% 40% 60% 60%;
    z-index: 1;
  }
  .whisker {
    position: absolute; top: 28px;
    width: 16px; height: 2px;
    background: var(--fur);
    opacity: .8;
  }
  .whisker.l1 { left: -12px; }
  .whisker.l2 { left: -12px; top: 34px; transform: rotate(8deg); }
  .whisker.r1 { right: -12px; }
  .whisker.r2 { right: -12px; top: 34px; transform: rotate(-8deg); }

  @keyframes blink {
    0%, 92%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(.08); }
  }

  /* Control panel */
  .panel {
    margin-top: 10px;
    background: var(--crust);
    border-radius: 2px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .stick {
    width: 8px; height: 18px;
    background: var(--ink);
    border-radius: 4px;
    position: relative;
  }
  .stick::before {
    content: "";
    position: absolute; top: -8px; left: 50%;
    transform: translateX(-50%);
    width: 14px; height: 14px;
    background: var(--nose);
    border-radius: 50%;
  }
  .btn-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--ink);
  }
  .btn-dot.pink { background: var(--nose); }

  /* ============ TITLE ============ */
  h1 {
    font-family: "Press Start 2P", monospace;
    font-size: clamp(20px, 5vw, 32px);
    color: var(--dough);
    text-shadow:
      3px 3px 0 rgba(0,0,0,.6),
      0 0 12px rgba(242,193,78,.35);
    margin: 24px 0 44px;
    text-align: center;
  }

  /* ============ GAME SELECT ============ */
  .select-label {
    font-family: "Press Start 2P", monospace;
    font-size: 11px;
    color: var(--screen);
    text-shadow: 0 0 8px rgba(121,242,195,.8), 0 0 20px rgba(121,242,195,.4);
    letter-spacing: 2px;
    margin-bottom: 16px;
    animation: pulse 1.6s steps(2) infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  .games {
    list-style: none;
    width: min(440px, 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .game-card {
    display: block;
    width: 100%;
    text-decoration: none;
    background: var(--ink-2);
    border: 3px solid var(--nose);
    border-radius: 4px;
    padding: 22px 24px 22px 56px;
    position: relative;
    transition: transform .15s ease, box-shadow .15s ease;
    box-shadow: 0 0 14px rgba(255,110,169,.35), inset 0 0 14px rgba(255,110,169,.12);
  }
  .game-card::before {          /* selector arrow, pure CSS */
    content: "";
    position: absolute;
    left: 24px; top: 50%;
    transform: translateY(-50%);
    width: 0; height: 0;
    border-top: 8px solid transparent;
    border-bottom: 8px solid transparent;
    border-left: 11px solid var(--screen);
    filter: drop-shadow(0 0 5px rgba(121,242,195,.8));
    animation: pulse 1s steps(2) infinite;
  }
  .game-card:hover,
  .game-card:focus-visible {
    transform: translateY(-3px);
    box-shadow: 0 0 26px rgba(255,110,169,.6), inset 0 0 18px rgba(255,110,169,.18);
  }
  .game-card:focus-visible {
    outline: 3px solid var(--screen);
    outline-offset: 4px;
  }
  .game-title {
    display: block;
    font-family: "Press Start 2P", monospace;
    font-size: 14px;
    color: var(--cream);
    line-height: 1.6;
  }
  .game-sub {
    display: block;
    color: var(--dough);
    font-weight: 700;
    font-size: 14px;
    margin-top: 6px;
  }

  footer {
    margin-top: auto;
    padding-top: 56px;
    font-size: 13px;
    opacity: .55;
    font-weight: 700;
  }

  @media (prefers-reduced-motion: reduce) {
    .eye, .select-label, .game-card::before { animation: none; }
    .game-card { transition: none; }
  }
</style>
</head>
<body>

  <!-- Logo: cat ears + arcade cabinet, pure CSS -->
  <div class="logo" role="img" aria-label="bagelarcade logo: an arcade cabinet with black cat ears and Bagel the black cat's face on the screen">
    <div class="ears">
      <div class="ear"></div>
      <div class="ear"></div>
    </div>
    <div class="cabinet">
      <div class="marquee">BAGEL</div>
      <div class="screen">
        <div class="face">
          <div class="eye l"></div>
          <div class="eye r"></div>
          <div class="snoot"></div>
          <div class="whisker l1"></div>
          <div class="whisker l2"></div>
          <div class="whisker r1"></div>
          <div class="whisker r2"></div>
        </div>
      </div>
      <div class="panel">
        <div class="stick"></div>
        <div class="btn-dot pink"></div>
        <div class="btn-dot"></div>
      </div>
    </div>
  </div>

  <h1>bagelarcade</h1>

  <p class="select-label">SELECT GAME</p>
  <ul class="games">
    <li>
      <a class="game-card" href="/walls.html">
        <span class="game-title">Every Wall Falls</span>
        <span class="game-sub">Press start to play</span>
      </a>
    </li>
    <li>
      <br />
    </li>
    <li>
      <a class="game-card" href="/ember.html">
        <span class="game-title">Emberwick Isle</span>
        <span class="game-sub">Press start to play</span>
      </a>
    </li>
  </ul>

  <footer>© bagelarcade · powered by treats</footer>

</body>
</html>
